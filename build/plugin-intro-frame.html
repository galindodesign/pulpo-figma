<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pulpo plugin frame (docs screenshot)</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #f5f5f5;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }
    .plugin-window {
      width: 500px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 8px;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 2px 8px rgba(0, 0, 0, 0.06),
        0 12px 40px rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }
    .plugin-header {
      height: 41px;
      display: flex;
      align-items: center;
      padding: 0 6px 0 10px;
      gap: 8px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: #fff;
    }
    .plugin-header__icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
      display: block;
    }
    .plugin-header__title {
      flex: 1;
      font: 600 11px/16px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(0, 0, 0, 0.9);
    }
    .plugin-header__close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0, 0, 0, 0.65);
    }
    .plugin-header__close svg {
      display: block;
    }
    .plugin-content {
      width: 500px;
      height: 720px;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="plugin-window" id="pluginWindow">
    <header class="plugin-header" aria-hidden="true">
      <img class="plugin-header__icon" src="assets/growthlab-plugin-icon.png" alt="" width="16" height="16" />
      <span class="plugin-header__title">Pulpo</span>
      <span class="plugin-header__close" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
    </header>
    <iframe class="plugin-content" src="ui.html" title="Pulpo"></iframe>
  </div>
</body>
</html>
