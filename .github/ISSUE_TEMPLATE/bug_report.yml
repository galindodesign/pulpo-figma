name: Bug report
description: Report something broken in Pulpo
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Check [FAQ](https://galindodesign.github.io/growthlab-infigma/FAQ) and [Troubleshooting](https://galindodesign.github.io/growthlab-infigma/TROUBLESHOOTING) first.
  - type: input
    id: version
    attributes:
      label: Pulpo version
      description: Shown in the plugin footer (e.g. v1.0.0)
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: email
    attributes:
      label: Email (optional)
      description: If you'd like a reply outside GitHub
      placeholder: you@company.com
  - type: dropdown
    id: editor
    attributes:
      label: Figma editor
      options:
        - Figma Design
        - FigJam
        - Figma Slides
        - Buzz
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, in order, before things went wrong?
      placeholder: |
        1. Open Pulpo in a Figma file
        2. Click Load example → Create flow
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
      placeholder: e.g. Connectors should stay attached to the cards after I move them.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: e.g. The connector line stayed in the old position.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag images here or paste links
