name: Feature request
description: Suggest an improvement for Pulpo
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Tell us what problem you're solving. Search [existing issues](https://github.com/galindolala1990/growthlab-infigma/issues) first and add a 👍 if it's already there.
  - type: input
    id: email
    attributes:
      label: Email (optional)
      description: If you'd like a reply outside GitHub
      placeholder: you@company.com
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's difficult or missing today?
      placeholder: |
        I'm trying to ___ but ___.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like Pulpo to help? A rough idea is fine.
      placeholder: |
        It would help if Pulpo could ___.
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Who benefits (optional)
      description: Who is this for, and when would they use it?
      placeholder: e.g. Anyone documenting experiments in Figma who needs to ___.
