name: Verify main plugin (live)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify plugin has no sync/connect UI leak
        run: npm run verify:plugin
      - name: Build live plugin
        run: npm run build
